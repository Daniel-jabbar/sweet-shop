<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweet Shop</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #fff8f0;
      }

      header {
        background: pink;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      h1,
      h2 {
        margin-top: 0;
      }

      #product-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Centrerer produkterne */
        gap: 30px;
        margin-top: 20px;
      }

      .product {
        background: white;
        border: 2px solid #ddd;
        border-radius: 15px;
        padding: 15px;
        width: 220px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .product img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .product button {
        margin-top: 10px;
      }

      .hidden {
        display: none;
      }

      #cart-panel {
        background: rgb(255, 192, 203);
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px;
      }

      #message-box {
        font-weight: bold;
        margin-top: 20px;
      }

      #receipt {
        margin-top: 20px;
        background: white;
        padding: 15px;
        border-radius: 10px;
      }

      .remove-btn {
        margin-left: 10px;
        background: red;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .remove-btn:hover {
        background: darkred;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sweet Shop</h1>
      <p id="shop-status"></p>
      <button id="toggle-cart-btn">Åbn/Luk kurv</button>
    </header>

    <main>
      <section>
        <h2>Vores produkter</h2>
        <div id="product-list"></div>
      </section>

      <aside id="cart-panel" class="hidden">
        <h2>Din kurv</h2>
        <ul id="cart-list"></ul>
        <p id="cart-total">Total: 0 kr</p>
        <button id="order-btn">Bestil nu</button>
      </aside>

      <section>
        <p id="message-box"></p>
        <div id="receipt"></div>
      </section>
    </main>

    <script>
      const products = [
        {
          name: "Jordbær/Chokolade/Vanilje Is",
          price: 30,
          category: "Is",
          image: "images/Is.jpg",
        },
        {
          name: "Fluffy Pancakes",
          price: 70,
          category: "Dessert",
          image: "images/Fluffy Pancakes.jpg",
        },
        {
          name: "Chokoladevaffel",
          price: 80,
          category: "Dessert",
          image: "images/Chokolade Vafler.jpg",
        },
        {
          name: "Cookie Dough",
          price: 50,
          category: "Dessert",
          image: "images/Cookie Dough.jpg",
        },
      ];

      const cart = [];

      const productList = document.getElementById("product-list");
      const cartList = document.getElementById("cart-list");
      const cartTotal = document.getElementById("cart-total");
      const cartPanel = document.getElementById("cart-panel");
      const toggleCartBtn = document.getElementById("toggle-cart-btn");
      const orderBtn = document.getElementById("order-btn");
      const messageBox = document.getElementById("message-box");
      const receipt = document.getElementById("receipt");
      const shopStatus = document.getElementById("shop-status");

      function renderProducts() {
        productList.innerHTML = "";

        products.forEach((product, index) => {
          const card = document.createElement("div");
          card.classList.add("product");

          card.innerHTML = `
            <h3>${product.name}</h3>
            <img src="${product.image}" alt="${product.name}">
            <p>Kategori: ${product.category}</p>
            <p>Pris: ${product.price} kr</p>
            <button data-index="${index}">Læg i kurv</button>
          `;

          productList.appendChild(card);
        });

        const buttons = productList.querySelectorAll("button");
        buttons.forEach((button) => {
          button.addEventListener("click", function () {
            const index = this.dataset.index;
            addToCart(index);
          });
        });
      }

      function addToCart(index) {
        cart.push(products[index]);
        renderCart();
        messageBox.textContent = `${products[index].name} er tilføjet til kurven`;
      }

      function renderCart() {
        cartList.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
          const li = document.createElement("li");

          li.innerHTML = `
            ${item.name} - ${item.price} kr
            <button class="remove-btn" data-index="${index}">Fjern</button>
          `;

          cartList.appendChild(li);
          total += item.price;
        });

        cartTotal.textContent = `Total: ${total} kr`;

        const removeButtons = document.querySelectorAll(".remove-btn");
        removeButtons.forEach((button) => {
          button.addEventListener("click", function () {
            const index = this.dataset.index;
            removeFromCart(index);
          });
        });
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
        messageBox.textContent = "Produkt fjernet fra kurven";
      }

      function toggleCart() {
        cartPanel.classList.toggle("hidden");
      }

      function checkShopStatus() {
        const now = new Date();
        const hour = now.getHours();

        if (hour >= 10 && hour < 20) {
          shopStatus.textContent = "Butikken er åben";
        } else {
          shopStatus.textContent = "Butikken er lukket";
        }
      }

      function placeOrder() {
        const now = new Date();
        const hour = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, "0");

        if (hour < 10 || hour >= 20) {
          messageBox.textContent =
            "Butikken er lukket. Du kan ikke bestille lige nu.";
          return;
        }

        if (cart.length === 0) {
          messageBox.textContent = "Din kurv er tom.";
          return;
        }

        let total = 0;
        let itemsHTML = "";

        cart.forEach((item) => {
          total += item.price;
          itemsHTML += `<li>${item.name} - ${item.price} kr</li>`;
        });

        receipt.innerHTML = `
          <h3>Kvittering</h3>
          <p>Tidspunkt: ${hour}:${minutes}</p>
          <ul>${itemsHTML}</ul>
          <p><strong>Total: ${total} kr</strong></p>
        `;

        messageBox.textContent = "Tak for din bestilling!";

        cart.length = 0;
        renderCart();
      }

      toggleCartBtn.addEventListener("click", toggleCart);
      orderBtn.addEventListener("click", placeOrder);

      renderProducts();
      renderCart();
      checkShopStatus();
    </script>
  </body>
</html>
